<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Campus Events</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <nav>
        <a href="index.html" class="nav-brand">CampusEvents</a>
        <div class="nav-links">
            <a href="index.html">Events</a>
            <a href="dashboard.html" style="color: var(--primary); font-weight: 600;">My Dashboard</a>
            <a href="#" onclick="logout()" class="btn btn-outline">Logout</a>
        </div>
    </nav>

    <main>
        <div class="mb-3 d-flex justify-between align-center">
            <div>
                <h1 class="page-title mb-1">My Dashboard</h1>
                <p style="color: var(--text-muted);" id="welcome-msg">Welcome back!</p>
            </div>
        </div>

        <div id="alert-container"></div>
        
        <h2 class="mb-2" style="font-weight: 600;">My Registered Events</h2>
        <div class="events-grid" id="registered-events-container">
            <div class="text-center w-100" style="grid-column: 1 / -1; padding: 2rem;">
                <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || user.role === 'admin') {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('welcome-msg').innerText = `Welcome back, ${user.name}!`;
            fetchRegisteredEvents();
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        async function fetchRegisteredEvents() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('registered-events-container');

            try {
                const response = await fetch(`${API_URL}/events/user/registered`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }

                if (!response.ok) throw new Error('Failed to fetch events');
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = `
                        <div class="glass-panel text-center w-100" style="padding: 3rem; grid-column: 1/-1;">
                            <p class="mb-2" style="color: var(--text-muted);">You haven't registered for any events yet.</p>
                            <a href="index.html" class="btn btn-primary">Browse Events</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = events.map(event => {
                    const date = new Date(event.date).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
                    return `
                        <div class="event-card glass-panel" id="event-${event.id}">
                            <h3>${event.title}</h3>
                            <div class="event-meta">
                                <span><i class="fa-regular fa-calendar"></i> ${date}</span>
                                <span><i class="fa-solid fa-location-dot"></i> ${event.venue}</span>
                            </div>
                            <button class="btn btn-danger mt-3 w-100" onclick="unregisterEvent(${event.id})">Cancel Registration</button>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="alert alert-error" style="grid-column: 1/-1;">Could not load your registered events.</div>`;
            }
        }

        async function unregisterEvent(eventId) {
            if (!confirm('Are you sure you want to cancel your registration?')) return;

            const token = localStorage.getItem('token');
            const alertContainer = document.getElementById('alert-container');

            try {
                const response = await fetch(`${API_URL}/events/${eventId}/unregister`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                
                if (response.ok) {
                    alertContainer.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
                    fetchRegisteredEvents();
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
                }

                setTimeout(() => { alertContainer.innerHTML = ''; }, 3000);
            } catch (error) {
                alertContainer.innerHTML = `<div class="alert alert-error">An error occurred while unregistering.</div>`;
            }
        }
    </script>
</body>
</html>
