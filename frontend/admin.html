<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Campus Events</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }
        .admin-nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .admin-nav-btn.active {
            background: rgba(139, 92, 246, 0.2);
            color: var(--primary);
            font-weight: 600;
        }
        .admin-section {
            display: none;
        }
        .admin-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <nav>
        <a href="index.html" class="nav-brand">CampusEvents</a>
        <div class="nav-links">
            <a href="index.html">Events</a>
            <a href="admin.html" style="color: var(--primary); font-weight: 600;">Admin Dashboard</a>
            <a href="#" onclick="logout()" class="btn btn-outline">Logout</a>
        </div>
    </nav>

    <main>
        <div class="mb-3 d-flex justify-between align-center">
            <div>
                <h1 class="page-title mb-1">Admin Dashboard</h1>
                <p style="color: var(--text-muted);">Manage events, users, and oversee registrations.</p>
            </div>
            <button class="btn btn-primary" onclick="openEventModal()">
                <i class="fa-solid fa-plus"></i> Create Event
            </button>
        </div>

        <div id="alert-container"></div>

        <div class="admin-nav">
            <button class="admin-nav-btn active" onclick="switchTab('events', this)">Manage Events</button>
            <button class="admin-nav-btn" onclick="switchTab('registrations', this)">Registrations</button>
            <button class="admin-nav-btn" onclick="switchTab('users', this)">Master Users</button>
        </div>

        <!-- Section: Events -->
        <section id="section-events" class="admin-section active">
            <div class="table-responsive p-3" style="background:var(--glass-bg); backdrop-filter:blur(10px); border-radius:12px;">
                <table id="events-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Venue</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Section: Registrations -->
        <section id="section-registrations" class="admin-section">
            <div class="table-responsive p-3" style="background:var(--glass-bg); backdrop-filter:blur(10px); border-radius:12px;">
                <table id="registrations-table">
                    <thead>
                        <tr>
                            <th>Reg ID</th>
                            <th>Event</th>
                            <th>User</th>
                            <th>Contact</th>
                            <th>Payment</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Section: Users -->
        <section id="section-users" class="admin-section">
            <div class="table-responsive p-3" style="background:var(--glass-bg); backdrop-filter:blur(10px); border-radius:12px;">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Create/Edit Event Modal -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal-content glass-panel" style="background: rgba(15, 23, 42, 0.95);">
            <div class="modal-header">
                <h2 id="modal-title" style="color:white;">Create Event</h2>
                <button class="close-btn" onclick="closeEventModal()">&times;</button>
            </div>
            <form id="event-form">
                <input type="hidden" id="event-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="event-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="event-desc" class="form-control" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Date & Time</label>
                    <input type="datetime-local" id="event-date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Venue</label>
                    <input type="text" id="event-venue" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Event</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');
        
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            loadData();
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`section-${tabId}`).classList.add('active');
            btn.classList.add('active');
        }

        function showAlert(msg, isError=false) {
            const c = document.getElementById('alert-container');
            c.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${msg}</div>`;
            setTimeout(() => c.innerHTML = '', 4000);
        }

        async function apiFetch(endpoint, options = {}) {
            options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(`${API_URL}${endpoint}`, options);
            if (res.status === 401 || res.status === 403) {
                logout();
                throw new Error("Unauthorized");
            }
            return res;
        }

        async function loadData() {
            fetchAdminEvents();
            fetchRegistrations();
            fetchUsers();
        }

        // --- Events ---
        async function fetchAdminEvents() {
            try {
                const res = await fetch(`${API_URL}/events`);
                const events = await res.json();
                const tbody = document.querySelector('#events-table tbody');
                
                if (events.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No events found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = events.map(e => `
                    <tr>
                        <td>#${e.id}</td>
                        <td>${e.title}</td>
                        <td>${new Date(e.date).toLocaleString()}</td>
                        <td>${e.venue}</td>
                        <td>
                            <button class="btn btn-sm btn-outline mb-1" onclick='editEvent(${JSON.stringify(e).replace(/'/g, "&#39;")})'>Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteEvent(${e.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function openEventModal() {
            document.getElementById('modal-title').innerText = 'Create Event';
            document.getElementById('event-form').reset();
            document.getElementById('event-id').value = '';
            document.getElementById('event-modal').classList.add('active');
        }

        function closeEventModal() {
            document.getElementById('event-modal').classList.remove('active');
        }

        function editEvent(e) {
            document.getElementById('modal-title').innerText = 'Edit Event';
            document.getElementById('event-id').value = e.id;
            document.getElementById('event-title').value = e.title;
            document.getElementById('event-desc').value = e.description;
            
            // Format date for datetime-local input
            const d = new Date(e.date);
            const tzoffset = d.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(d - tzoffset)).toISOString().slice(0, 16);
            document.getElementById('event-date').value = localISOTime;
            
            document.getElementById('event-venue').value = e.venue;
            document.getElementById('event-modal').classList.add('active');
        }

        document.getElementById('event-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('event-id').value;
            const payload = {
                title: document.getElementById('event-title').value,
                description: document.getElementById('event-desc').value,
                date: document.getElementById('event-date').value,
                venue: document.getElementById('event-venue').value
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const endpoint = id ? `/admin/events/${id}` : '/admin/events';
                
                const res = await apiFetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (res.ok) {
                    showAlert(data.message);
                    closeEventModal();
                    fetchAdminEvents();
                } else {
                    showAlert(data.message, true);
                }
            } catch (err) {
                showAlert('An error occurred.', true);
            }
        });

        async function deleteEvent(id) {
            if (!confirm('Are you sure you want to delete this event? This will also remove all registrations for it.')) return;
            try {
                const res = await apiFetch(`/admin/events/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showAlert('Event deleted');
                    fetchAdminEvents();
                    fetchRegistrations();
                }
            } catch (err) {
                console.error(err);
            }
        }

        // --- Registrations ---
        async function fetchRegistrations() {
            try {
                const res = await apiFetch('/admin/registrations');
                const regs = await res.json();
                const tbody = document.querySelector('#registrations-table tbody');
                
                if (regs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No registrations found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = regs.map(r => `
                    <tr>
                        <td>#${r.id}</td>
                        <td>${r.event_title}</td>
                        <td>${r.user_name}</td>
                        <td>${r.phone || 'N/A'}<br><small style="color:var(--text-muted);">${r.user_email}</small></td>
                        <td>${r.payment_method || 'Free'}<br><small style="color:var(--text-muted);">${r.transaction_id || 'N/A'}</small></td>
                        <td>${new Date(r.registered_at).toLocaleString()}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        // --- Users ---
        async function fetchUsers() {
            try {
                const res = await apiFetch('/admin/users');
                const users = await res.json();
                const tbody = document.querySelector('#users-table tbody');
                
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>#${u.id}</td>
                        <td>${u.name}</td>
                        <td>${u.email}</td>
                        <td><span style="background: ${u.role==='admin'?'var(--danger)':'var(--primary)'}; padding: 2px 8px; border-radius: 12px; font-size:0.8rem; color: white;">${u.role}</span></td>
                        <td>
                            ${u.role !== 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Delete</button>` : '-'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user? This will also remove all their registrations.')) return;
            try {
                const res = await apiFetch(`/admin/users/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showAlert('User deleted');
                    fetchUsers();
                    fetchRegistrations();
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
