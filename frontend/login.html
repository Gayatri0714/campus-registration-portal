<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Campus Events</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <nav>
        <a href="index.html" class="nav-brand">CampusEvents</a>
        <div class="nav-links">
            <a href="index.html">Events</a>
            <a href="login.html" class="btn btn-outline" style="border-color: transparent; background: rgba(139, 92, 246, 0.1);">Login</a>
            <a href="register.html" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <main>
        <div class="form-container glass-panel">
            <h2 class="form-title">Welcome Back</h2>
            <div id="alert-container"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="name@campus.edu">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100" style="padding: 0.8rem;">Login</button>
            </form>
            <div class="form-footer">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alert-container');

            try {
                const res = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
                }
            } catch (err) {
                alertContainer.innerHTML = `<div class="alert alert-error">Network error. Is the server running?</div>`;
            }
        });
    </script>
</body>
</html>
